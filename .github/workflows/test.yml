# Gate the host Go binary on every push/PR: format, vet, and tests must pass.
# (The publish workflow only runs on version tags; this is the always-on check.)
name: test

on:
  push:
  pull_request:

jobs:
  go:
    name: go vet + test (services/host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: gofmt
        working-directory: services/host
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: vet
        working-directory: services/host
        run: go vet ./...
      - name: test
        working-directory: services/host
        run: go test -race ./...

  open-core:
    name: open-core boundary (no company/overlay leak)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check allowlists + tracked tree
        run: bash scripts/check-open-core.sh
