schemaVersion: "1"
kind: sandbox
name: pi-stack
displayName: Pi Stack
description: "Multi-model pi coding agent on a Docker Hardened (DHI) Debian base"

sandbox:
  # Published image — consumers pull this by name (sbx auto-pulls it). For local
  # dev, `make load` builds + loads the image under this same name, so sbx uses
  # your local build instead of pulling. Change the namespace to match your
  # Docker Hub handle (must match Makefile DOCKER_USER).
  #
  # MUST be a pinned tag, never `:latest` — Docker re-pulls `:latest` on every
  # run even when the image is already loaded, defeating `make load`. A pinned
  # tag means "use the loaded build if present, else pull once." Keep in sync
  # with VERSION in the Makefile and `version` in package.json.
  image: "docker.io/mcavage/pi-stack:0.0.1"
  aiFilename: AGENTS.md
  entrypoint:
    # --session-dir persists sessions on the host-mounted workspace so they
    # survive sandbox recreation (resume with `pi -c` / `pi -r`); --models sets
    # the Alt+P cycle squad (Ctrl+P is remapped to emacs cursor-up).
    run: [pi, "--session-dir", ".pi-sessions", "--models", "anthropic/claude-opus-4-8,openai/gpt-5.5,anthropic/claude-haiku-4-5"]

# Provider keys are read by the host proxy and swapped into the outbound auth
# header — the agent inside the VM only ever sees the "proxy-managed" sentinel.
#
# Uses kit-spec v1. `sbx kit validate` flags these fields as deprecated for v2
# (credentials[].apiKey.inject[] + caps.network.allow), but v2 ALSO requires an
# as-yet-undocumented per-credential source/service binding — omitting it makes
# `sbx run` panic ("invalid identifier ... credentials/<sandbox>/"). v1 is what
# every official Docker example + the contrib `pi` kit use; it validates (with
# deprecation warnings only) and works. Revisit v2 once its schema is documented.
network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    claude.ai: anthropic
    api.openai.com: openai
    api.github.com: github
    uploads.github.com: github
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
    openai:
      headerName: Authorization
      valueFormat: "Bearer %s"
    github:
      headerName: Authorization
      valueFormat: "Bearer %s"
  allowedDomains:
    - registry.npmjs.org
    - nodejs.org
    - github.com
    - api.github.com
    - uploads.github.com
    - codeload.github.com
    - objects.githubusercontent.com
    - raw.githubusercontent.com
    - pi.dev
    # pi-web-access web_search backends (else the call is blocked → hangs). Exa
    # is the zero-config default; the rest are its fallbacks. Add a provider key
    # (EXA_API_KEY / GEMINI_API_KEY / PERPLEXITY_API_KEY) for reliable results.
    - api.exa.ai
    - mcp.exa.ai
    - generativelanguage.googleapis.com
    - api.perplexity.ai
    # Google Workspace CLI runtime endpoints. The gws wrapper obtains a bearer
    # from a host service, then gws calls these APIs directly from the sandbox.
    - www.googleapis.com
    - gmail.googleapis.com
    - calendar-pa.clients6.google.com
    - drive.googleapis.com
    - docs.googleapis.com
    - sheets.googleapis.com
    - people.googleapis.com
    - oauth2.googleapis.com
    # Host gws token service (optional; without it the gws wrapper degrades to
    # the real binary unauthenticated).
    - host.docker.internal:11441
    - localhost:11441
    # Host memory service (the recall extension calls it over JSON-RPC). The store
    # and its embeddings live on the host; the sandbox only needs this URL. Host-
    # internal traffic bypasses the proxy MITM (see NO_PROXY in the Dockerfile);
    # recall is skipped if the service isn't running. Same pattern the private overlay kit
    # uses to reach host services on host.docker.internal.
    - host.docker.internal:11435
    - localhost:11435
    # Optional overlay host service on :11442 (e.g. a host-side CLI exec-proxy a
    # private overlay wires up). Harmless when nothing is listening; an in-sandbox
    # wrapper forwards argv to it so credentials/SSO stay on the host.
    - host.docker.internal:11442
    - localhost:11442
    # Note: local stdio MCP servers (e.g. slack) are NOT here. They're registered
    # with sbx (`sbx mcp add … --command pi-stack-host --args slack`), run by the
    # MCP gateway and reached through it — not over host.docker.internal — so they
    # need no allowlist entry.

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY
    github:
      env:
        - GH_TOKEN
    google:
      env:
        - GEMINI_API_KEY
    openai:
      env:
        - OPENAI_API_KEY


environment:
  variables:
    # pi runs on Node, which uses its own bundled CA store (not the system one),
    # so it must be told to also trust the proxy's intercepting CA.
    NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/proxy-ca.crt
  proxyManaged:
    - ANTHROPIC_API_KEY
    - GEMINI_API_KEY
    - GH_TOKEN
    - OPENAI_API_KEY

# The sandbox proxy terminates TLS and presents its own CA (delivered at runtime
# via $PROXY_CA_CERT_B64). The stock template images trust it out of the box; a
# custom image must install it. Same pattern as the docs' `internal-ca` kit.
commands:
  install:
    - command: 'mkdir -p /usr/local/share/ca-certificates && printf "%s" "$PROXY_CA_CERT_B64" | base64 -d > /usr/local/share/ca-certificates/proxy-ca.crt && update-ca-certificates'
      user: "0"
      description: Trust the sandbox proxy's TLS-intercepting CA

agentContext: |
  # pi-stack
  You are pi, running inside the pi-stack sandbox: a Docker Hardened (DHI) Debian
  base, isolated by Docker Sandboxes. The environment is disposable. Work
  directly and commit often.

  ## Memory (automatic)
  A host memory service recalls relevant facts into your context before every
  turn, and quietly captures durable facts and corrections after. You never call
  it. To see or steer it: /recall, /remember, /forget, /learnings. If recall is
  empty, the user needs to run `make memory-serve` on the host.

  ## Multi-model
  ANTHROPIC, OPENAI, GEMINI keys are all injected by the host proxy, never stored in
  this VM. Switch models with /model or --model. Additionally Ollama is available to
  you at http://host.docker.internal:11434. Use a cheap, fast model like haiku or
  gemma for bulk fan-out and a stronger one like Opus for synthesis and review.

  ## Subagents and the roster
  The Agent tool runs subagents in parallel from presets in ~/.pi/agent/agents:
    - fanout (haiku, read-only): spawn many for breadth.
    - deep (opus): one genuinely hard sub-problem.
    - review (cross-vendor): an adversarial second opinion before you ship.
    - specialists: architect, engineer, designer, product-manager, qa-lead,
      security-lead, sre-lead, devrel, dx-consultant, legal, finance-analyst,
      growth-marketing, ux-copywriter, enterprise-admin.
  Fan a task across the right roles, then synthesize. Use review before shipping.

  ## Skills
  Tight, opinionated workflows you run by name: investigate, spec, code-review,
  ship, verify, tdd, brainstorm, challenge, qa, design-review, and many more. They
  are forcing functions, not manuals. Auto-loaded when relevant.

  ## Installed harness
  plan mode (pi-plan), pi-mcp-adapter, todo list, pi-simplify, pi-web-access,
  pi-lens (inline LSP diagnostics), powerbar statusline + usage HUD.

  ## CLIs and MCP
  `gh` and `gws` are installed. GitHub auth is routed through sbx credentials.
  `gws` uses a host token service for short-lived Google Workspace bearers. Slack
  (the `chat` capability) is a host-side stdio MCP server run by the MCP gateway;
  its token stays on the host. Run the host services with `make serve`. Use sbx
  Cloud MCP Gateway profiles for catalog servers (notion, atlassian, granola, …).

  ## Posture
  Full-auto: no permission prompts. The sandbox isolation is the safety boundary.
  Write in the user's voice (see the anti-slop and write-like-mark skills): no
  em-dashes, no AI slop, direct and concrete.
