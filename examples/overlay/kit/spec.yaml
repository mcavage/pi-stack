schemaVersion: "1"
kind: mixin
name: my-overlay
displayName: My private overlay
description: >
  Example private overlay for pi-stack. Stacks on the public sandbox kit
  (`--kit ./pi-kit --kit ./pi-kit-work`) and adds company-specific skills, the full
  capabilities.json, and any in-sandbox wrappers under files/. The host half (extra
  pi-stack-host services) is NOT here — it's services/host/overlay_*.go plugins.
  See docs/OVERLAY.md.

# A mixin can also add network rules / install commands if your overlay needs them:
# network:
#   allowedDomains:
#     - api.your-internal-service.example
